<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartID CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g:#1E5C4E;--gd:#1A3D30;--gm:#2D7A65;--gt:#4AAF96;--gold:#C8A84B;--w:#fff;--bg:#F4F8F6;--bg2:#EBF2EF;--br:#C8DDD4;--tx:#1A3D30;--mu:#557A6A;--err:#C0392B;--errl:#FDEDEC;--warn:#E67E22;--warnl:#FDF2E9;--sb:220px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
.demo-bar{background:linear-gradient(90deg,var(--gd),var(--gm));color:rgba(255,255,255,.75);text-align:center;padding:7px;font-size:12px;font-weight:500;}
.demo-bar b{color:var(--gt);}
.shell{display:flex;height:calc(100vh - 33px);overflow:hidden;}
.sidebar{width:var(--sb);flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.sbh{padding:1.2rem 1.2rem .7rem;border-bottom:1px solid rgba(255,255,255,.07);}
.sbl{font-size:18px;font-weight:700;color:#fff;}.sbl span{color:var(--gt);}
.sbu{font-size:11px;color:rgba(255,255,255,.35);margin-top:.15rem;}
.sbn{flex:1;padding:.6rem .4rem;}
.sbsc{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:.5rem .8rem .25rem;margin-top:.4rem;}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;margin-bottom:2px;background:transparent;border:none;width:100%;text-align:left;transition:all .15s;}
.sbi:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.sbi.active{background:rgba(255,255,255,.12);color:#fff;}
.sbi svg{flex-shrink:0;opacity:.7;}.sbi.active svg{opacity:1;}
.sbdg{margin-left:auto;background:rgba(255,255,255,.14);color:rgba(255,255,255,.75);font-size:10px;padding:1px 6px;border-radius:9px;}
.sbi.active .sbdg{background:rgba(74,175,150,.28);color:var(--gt);}
.sbf{padding:.6rem .4rem;border-top:1px solid rgba(255,255,255,.06);}
.sbsy{display:flex;align-items:center;gap:6px;padding:.35rem .8rem;font-size:11px;color:rgba(255,255,255,.3);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--gt);}
.main{flex:1;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.ph{padding:.9rem 1.4rem;background:var(--w);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:1rem;flex-wrap:wrap;}
.ph-t{font-size:15px;font-weight:600;}
.ph-s{font-size:12px;color:var(--mu);margin-top:1px;}
.ph-a{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ca{flex:1;padding:1.2rem 1.4rem;}
.btn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;}
.bp{background:var(--g);color:#fff;}.bp:hover{background:var(--gm);}
.bs{background:var(--w);color:var(--tx);border:1px solid var(--br);}.bs:hover{background:var(--bg2);}
.bd{background:transparent;color:var(--err);border:1px solid #F09595;}.bd:hover{background:var(--errl);}
.bw{background:transparent;color:var(--warn);border:1px solid #F0C090;}.bw:hover{background:var(--warnl);}
.bxs{padding:4px 9px;font-size:11px;border-radius:6px;}
.srch{position:relative;width:100%;margin-bottom:.9rem;}
.srch input{width:100%;padding:8px 11px 8px 34px;border:1px solid var(--br);border-radius:8px;background:var(--w);color:var(--tx);font-size:13px;outline:none;transition:border-color .18s;}
.srch input:focus{border-color:var(--gt);}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.38;pointer-events:none;}
.twrap{background:var(--w);border:1px solid var(--br);border-radius:12px;overflow:hidden;overflow-x:auto;}
.ct{width:100%;border-collapse:collapse;font-size:13px;min-width:820px;}
.ct thead th{background:var(--gd);color:#fff;padding:9px 11px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.04em;white-space:nowrap;}
.ct tbody tr.dr{border-bottom:1px solid var(--bg2);transition:background .13s;cursor:pointer;}
.ct tbody tr.dr:hover{background:var(--bg);}
.ct tbody tr.dr.ro{background:var(--bg2);}
.ct td{padding:8px 11px;vertical-align:middle;white-space:nowrap;}
.tn{font-weight:600;}.tmo{font-family:monospace;font-size:12px;color:var(--mu);}.tmu{color:var(--mu);}
.hrt{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;transition:transform .13s;}
.hrt:hover{transform:scale(1.2);}
.hon{color:#e74c3c;}.hof{color:#ddd;}
.bdg{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap;}
.bsi{background:#E6F1FB;color:#185FA5;}.bpa{background:#EAF3DE;color:#3B6D11;}.bfa{background:#FAEEDA;color:#854F0B;}.bad{background:#EEEDFE;color:#534AB7;}
.bpill{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;}
.bon{background:#FDEDEC;color:#A32D2D;}.bof{background:#EAF3DE;color:#3B6D11;}
.xrow td{padding:0;background:var(--bg2);}
.xi{padding:14px 14px 14px 38px;display:flex;flex-direction:column;gap:11px;}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;}
.ii label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
.ii span{font-size:13px;}
.bbar{background:var(--w);border:1px solid var(--br);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;max-width:480px;}
.pbw{flex:1;height:4px;background:var(--br);border-radius:2px;overflow:hidden;}
.pb{height:100%;background:var(--g);border-radius:2px;}
.xsec{background:var(--w);border:1px solid var(--br);border-radius:10px;overflow:hidden;}
.xsh{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--bg2);}
.xsh h4{font-size:12px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:6px;}
.xsb{padding:12px 13px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pgrid label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;}
.pgrid select,.bsel{padding:7px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg);color:var(--tx);font-size:13px;outline:none;cursor:pointer;}
.pgrid select:focus,.bsel:focus{border-color:var(--gt);}
.pgrid select{width:100%;}
.brrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.brrow p{font-size:12px;color:var(--mu);}
.nadd{display:flex;gap:7px;align-items:flex-end;margin-bottom:9px;}
.nta{flex:1;padding:8px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg);color:var(--tx);font-family:inherit;font-size:13px;resize:none;outline:none;min-height:52px;line-height:1.5;}
.nta:focus{border-color:var(--gt);}
.nlist{display:flex;flex-direction:column;gap:5px;}
.ne{background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:9px 11px;}
.nts{font-size:11px;color:var(--mu);margin-bottom:3px;}
.ntx{font-size:13px;color:var(--tx);line-height:1.55;white-space:pre-wrap;}
.ntog{background:none;border:none;cursor:pointer;font-size:12px;color:var(--g);font-weight:600;padding:3px 0;display:flex;align-items:center;gap:3px;}
.ntog:hover{text-decoration:underline;}
.arow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.adv{width:1px;height:18px;background:var(--br);margin:0 2px;}
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.2rem;}
.scard{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:.9rem;text-align:center;}
.scl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
.scv{font-size:24px;font-weight:700;color:var(--g);}
.scv.r{color:var(--err);}.scv.gr{color:var(--mu);}.scv.go{color:var(--gold);}
.stw{background:var(--w);border-radius:12px;border:1px solid var(--br);overflow:hidden;}
.st{width:100%;border-collapse:collapse;font-size:13px;}
.st th{background:var(--gd);color:#fff;padding:9px 13px;text-align:left;font-size:12px;font-weight:600;}
.st th:not(:first-child){text-align:center;}
.st td{padding:9px 13px;border-bottom:1px solid var(--br);}
.st td:not(:first-child){text-align:center;font-weight:500;}
.st tr:last-child td{border:none;}
.st tr:hover td{background:var(--bg);}
.st .tot td{background:var(--bg2);font-weight:700;border-top:2px solid var(--br);}
.ng{color:var(--g);}.nr{color:var(--err);}.nmu{color:var(--mu);}
.ysel{padding:7px 11px;border:1px solid var(--br);border-radius:8px;font-size:13px;background:var(--w);color:var(--tx);outline:none;cursor:pointer;}
.ktg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;}
.ktc{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;cursor:pointer;transition:border-color .18s;}
.ktc:hover{border-color:var(--gt);}.ktc.op{border-color:var(--gt);border-width:1.5px;}
.ktcn{font-size:14px;font-weight:600;margin-bottom:4px;}
.ktcm{font-size:12px;color:var(--mu);display:flex;flex-direction:column;gap:2px;}
.ktcb{margin-top:10px;border-top:1px solid var(--br);padding-top:10px;display:none;}
.ktc.op .ktcb{display:block;}
.ktcnotes{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
.cc{background:var(--w);border:1px solid var(--br);border-radius:12px;padding:1.4rem;margin-bottom:1rem;max-width:720px;}
.cc h3{font-size:14px;font-weight:600;margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--br);}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg);color:var(--tx);font-size:13px;outline:none;transition:border-color .18s;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gt);}
.fromf{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--br);border-radius:8px;background:var(--bg2);font-size:13px;color:var(--mu);}
.fromf span{color:var(--tx);font-weight:500;}
.rtog{display:flex;gap:7px;margin-bottom:9px;}
.rb{padding:5px 13px;border-radius:6px;border:1px solid var(--br);background:var(--w);color:var(--mu);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;}
.rb.a{background:var(--g);color:#fff;border-color:var(--g);}
.pnote{background:var(--bg2);border:1px solid var(--br);border-left:3px solid var(--gt);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--mu);line-height:1.7;}
.pnote b{color:var(--tx);}
.rl{max-height:200px;overflow-y:auto;border:1px solid var(--br);border-radius:8px;background:var(--bg);}
.ri{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--bg2);font-size:13px;}
.ri:last-child{border:none;}.ri input{width:14px;height:14px;cursor:pointer;accent-color:var(--g);}
.rs{padding:7px 10px;border-bottom:1px solid var(--br);font-size:13px;width:100%;outline:none;background:var(--w);border-radius:8px 8px 0 0;border-left:none;border-right:none;color:var(--tx);}
.sar{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--br);background:var(--w);font-size:12px;font-weight:600;color:var(--mu);}
.sbtn{width:100%;padding:10px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem;}
.sbtn:disabled{opacity:.4;cursor:not-allowed;}
.ccnt{font-size:11px;color:var(--mu);text-align:right;margin-top:2px;}
.ccnt.ov{color:var(--err);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:400;padding:1rem;}
.mdl{background:var(--w);border-radius:14px;padding:1.6rem;width:100%;max-width:420px;box-shadow:0 12px 48px rgba(0,0,0,.22);}
.mdl h2{font-size:15px;font-weight:600;margin-bottom:.6rem;}
.mdl p{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:1.2rem;}
.mdla{display:flex;gap:8px;justify-content:flex-end;}
.empty{text-align:center;padding:3rem 1rem;color:var(--mu);}

.clog{display:flex;flex-direction:column;gap:5px;}
.cle{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;background:var(--bg);border:1px solid var(--br);border-radius:8px;}
.cle-ico{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.cle-body{flex:1;}
.cle-what{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.cle-meta{font-size:11px;color:var(--mu);}
.cle-arrow{color:var(--g);font-weight:700;margin:0 4px;}
.ark-card{background:var(--w);border:1px solid var(--br);border-radius:10px;padding:1rem;cursor:pointer;transition:border-color .18s;}
.ark-card:hover{border-color:var(--mu);}
.ark-card.op{border-color:var(--mu);border-width:1.5px;}
.ark-badge-anger{background:#FDF2E9;color:var(--warn);border:1px solid #F0C090;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.ark-badge-mak{background:#FDEDEC;color:var(--err);border:1px solid #F09595;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.ark-badge-del{background:#F5F5F5;color:#555;border:1px solid #ccc;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.days-left-pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.dl-ok{background:#EAF3DE;color:#3B6D11;}
.dl-warn{background:#FDF2E9;color:var(--warn);}
.dl-exp{background:#F5F5F5;color:#888;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gd),var(--g));padding:1rem;}
.login-card{background:var(--w);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,.25);}
.login-logo{font-size:28px;font-weight:700;color:var(--g);margin-bottom:.2rem;}
.login-logo span{color:var(--gt);}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:2rem;}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
.login-card input{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;color:var(--tx);background:var(--bg);margin-bottom:14px;outline:none;transition:border-color .2s;font-family:inherit;}
.login-card input:focus{border-color:var(--gt);}
.login-btn{width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s;font-family:inherit;}
.login-btn:hover{opacity:.88;}
.login-err{color:var(--err);font-size:12px;margin-top:8px;display:none;text-align:center;}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:transparent;border:none;color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;border-radius:6px;transition:all .2s;margin-top:.5rem;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);}
@media(max-width:680px){:root{--sb:52px;}.sbi span,.sbsc,.sbu,.sbdg{display:none;}.sbi{justify-content:center;padding:10px;}.sbh{padding:.7rem .4rem;}.ca{padding:.7rem .9rem;}}
/* === AUDIO PLAYER (kundkort) === */
.audio-player{display:flex;align-items:center;gap:5px;background:var(--bg2);border-radius:7px;padding:5px 7px;}
.audio-play-btn{background:var(--g);color:#fff;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;}
.audio-play-btn:hover{background:var(--gd);}
.audio-rewind-btn,.audio-forward-btn{background:var(--w);border:1px solid var(--br);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g);flex-shrink:0;transition:all .15s;}
.audio-rewind-btn:hover,.audio-forward-btn:hover{background:var(--g);color:#fff;}
.audio-time-wrap{display:flex;align-items:center;gap:4px;flex:1;min-width:0;}
.audio-time-current,.audio-time-total{font-size:10px;color:var(--mu);font-variant-numeric:tabular-nums;flex-shrink:0;}
.audio-progress{flex:1;height:5px;background:rgba(0,0,0,.1);border-radius:3px;cursor:pointer;overflow:hidden;}
.audio-progress-bar{height:100%;background:var(--g);width:0%;transition:width .1s linear;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Smart<span>ID</span></div>
      <div class="login-sub">Kundtjänst-CRM · Logga in</div>
      <label>E-postadress</label>
      <input id="li-user" type="email" placeholder="din@email.se" autocomplete="username">
      <label>Lösenord</label>
      <input id="li-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="login-btn" id="login-btn">Logga in</button>
      <div class="login-err" id="login-err">Fel e-post eller lösenord.</div>
    </div>
  </div>
</div>

<div class="shell" id="app-shell" style="display:none;">
  <aside class="sidebar">
    <div class="sbh"><div class="sbl">Smart<span>ID</span></div><div class="sbu"></div><div id="conn-indicator" style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px;">⚪ Ansluter...</div></div>
    <nav class="sbn">
      <div class="sbsc">Huvudmeny</div>
      <button class="sbi active" data-tab="kunder"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg><span>Kunder</span><span class="sbdg" id="tc-k">0</span></button>
      <button class="sbi" data-tab="statistik"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="9" width="3" height="5"/><rect x="6.5" y="5" width="3" height="9"/><rect x="11" y="2" width="3" height="12"/></svg><span>Statistik</span></button>
      <button class="sbi" data-tab="kundtjanst"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 13.7C8 13.7 2 9.5 2 5.5a3.5 3.5 0 0 1 6-2.4A3.5 3.5 0 0 1 14 5.5c0 4-6 8.2-6 8.2z"/></svg><span>Kundtjänst</span><span class="sbdg" id="tc-kt">0</span></button>
      <div class="sbsc">Kommunikation</div>
      <button class="sbi" data-tab="arkiv"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="14" height="3" rx="1"/><path d="M2 6v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6"/><line x1="6" y1="10" x2="10" y2="10"/></svg><span>Borttagna kunder</span><span class="sbdg" id="tc-ark">0</span></button>
      <button class="sbi" data-tab="email"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M2 4l6 5 6-5"/></svg><span>E-post utskick</span></button>

<script>
// ============================================================================
// SUPABASE CONNECTION
// ============================================================================
const SUPABASE_URL='https://hfbhoufqvozbxkqlldzl.supabase.co';
const SUPABASE_KEY='sb_publishable_jdNOJLg2OOeyQfj8yLXIoA_6ySKL5tn';
const sb=supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Current user info – populated after login
let currentUser=null;     // { id, email, role: 'admin' | 'kundtjanst' }
let realtimeChannel=null; // For live sync

function ago(d){return new Date(Date.now()-d*86400000).toISOString();}
function nd(t,d){return{t,d:new Date(Date.now()-d*86400000).toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'})};}
function nowS(){return new Date().toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'});}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================================
// SUPABASE DATA HELPERS
// ============================================================================

// Convert DB row to internal format used by the existing UI code
function dbRowToCustomer(r){
  return {
    id:r.id,
    name:r.full_name,
    ssn:r.personal_number||'',
    email:r.email||'',
    phone:r.phone||'',
    address:[r.address,r.postal_code,r.city].filter(Boolean).join(', '),
    _address_raw:r.address||'',
    _postal_code:r.postal_code||'',
    _city:r.city||'',
    saljare:r._seller_name||'',  // populated via join
    seller_id:r.seller_id||null,
    pkg:r.package_type||'singel',
    pkg_tier:r.package_tier||'premium',
    addon: r.has_addon?(r.package_type||'singel'):'none',
    status: r.status==='active'?'aktiv':r.status==='angrad'?'anger':r.status==='makulerad'?'bortfall':r.status==='raderad'?'raderad':'aktiv',
    archived: r.status!=='active',
    favorite:false,
    legacy: r.is_existing_customer||false,
    created_at: r.created_at,
    bind_start: r.binding_start_date||r.created_at,
    bind_months: r.binding_months||0,
    deleted_at: r.status_changed_at||null,
    delete_reason: r.status==='angrad'?'anger':r.status==='makulerad'?'makulering':r.status==='raderad'?'radering':null,
    notes:[],         // loaded separately
    changes:[],       // loaded separately
    _raw:r            // keep raw db row for updates
  };
}

function customerToDbRow(c){
  // Convert internal format back to DB column names
  const statusMap={aktiv:'active',anger:'angrad',makulering:'makulerad',bortfall:'makulerad',raderad:'raderad'};
  return {
    full_name:c.name,
    personal_number:c.ssn||null,
    phone:c.phone||null,
    email:c.email||null,
    address:c._address_raw||c.address||null,
    postal_code:c._postal_code||null,
    city:c._city||null,
    seller_id:c.seller_id||null,
    package_type:c.pkg||null,
    package_tier:c.pkg_tier||'premium',
    has_addon:c.addon&&c.addon!=='none',
    binding_months:c.bind_months||0,
    binding_start_date:c.bind_start?c.bind_start.split('T')[0]:null,
    is_existing_customer:c.legacy||false,
    status:statusMap[c.status]||'active'
  };
}

// Load all customers + sellers from Supabase
async function loadFromSupabase(){
  try {
    // Load sellers first
    const {data:sellers, error:sErr}=await sb.from('sellers').select('*').eq('active',true);
    if(sErr) throw sErr;
    SELLERS=sellers||[];
    
    // Load customers with seller info
    const {data:customers, error:cErr}=await sb
      .from('customers')
      .select('*, seller:sellers(name)')
      .order('created_at',{ascending:false});
    if(cErr) throw cErr;
    
    C=(customers||[]).map(r=>{
      r._seller_name=r.seller?r.seller.name:'';
      return dbRowToCustomer(r);
    });
    
    return true;
  } catch(err) {
    console.error('Load failed:',err);
    alert('Kunde inte ladda data från databasen: '+err.message);
    return false;
  }
}

// Save NEW customer to Supabase (returns saved row)
async function createCustomer(c){
  const row=customerToDbRow(c);
  row.created_by=currentUser?.id||null;
  const {data, error}=await sb.from('customers').insert(row).select().single();
  if(error){alert('Kunde inte spara: '+error.message);return null;}
  return data;
}

// Update existing customer in Supabase
async function updateCustomer(id, updates){
  const {data, error}=await sb.from('customers').update(updates).eq('id',id).select().single();
  if(error){alert('Kunde inte uppdatera: '+error.message);return null;}
  return data;
}

// Permanently delete a customer (admin/kundtjanst only by RLS)
async function permanentDeleteCustomer(id){
  const {error}=await sb.from('customers').delete().eq('id',id);
  if(error){alert('Kunde inte radera: '+error.message);return false;}
  // Log the deletion in changelog
  try {
    await sb.from('changelog').insert({
      customer_id:null,  // referensen är borta nu
      customer_name_snapshot:'(permanent raderad)',
      action:'permanent_delete',
      description:'Kund permanent raderad (GDPR-begäran eller manuell rensning)',
      changed_by:currentUser?.id||null,
      changed_by_name:currentUser?.email||''
    });
  } catch(e){console.warn('Logged delete but changelog failed:',e);}
  return true;
}

// Setup realtime subscription so all logged-in users see updates live
function setupRealtime(){
  if(realtimeChannel) return;
  realtimeChannel=sb.channel('customers-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'customers'},async(payload)=>{
      const prevOpenId=S.openId;
      await loadFromSupabase();
      if(prevOpenId) await loadCustomerDetail(prevOpenId);
      render();
    })
    .subscribe((status)=>{
      const ind=document.getElementById('conn-indicator');
      if(ind){
        if(status==='SUBSCRIBED'){ind.textContent='🟢 Live';ind.title='Ansluten – ändringar syns direkt';}
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){ind.textContent='🔴 Offline';ind.title='Anslutning bruten – ladda om sidan';}
      }
    });
}

// ============================================================================
// ITERATION 2 – NOTES, CHANGELOG, AUDIO
// ============================================================================

// Lazy-load notes + changelog + audio when a customer card opens
async function loadCustomerDetail(customerId){
  const c=C.find(x=>x.id===customerId);
  if(!c) return;
  try {
    const [{data:notes},{data:changelog},{data:audio}]=await Promise.all([
      sb.from('notes').select('*').eq('customer_id',customerId).order('created_at',{ascending:false}),
      sb.from('changelog').select('*').eq('customer_id',customerId).order('changed_at',{ascending:false}),
      sb.from('audio_files').select('*').eq('customer_id',customerId).eq('context','customer').limit(1).maybeSingle()
    ]);
    c.notes=(notes||[]).map(n=>({id:n.id,t:n.content,d:new Date(n.created_at).toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'}),by:n.created_by_name||''}));
    c.changes=(changelog||[]).map(ch=>({id:ch.id,field:ch.field_name||ch.action,from:ch.old_value||'',to:ch.new_value||ch.description||'',d:new Date(ch.changed_at).toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'}),by:ch.changed_by_name||''}));
    c._audio=audio||null;
    c._detailLoaded=true;
  } catch(e){console.error('loadCustomerDetail failed:',e);}
}

// Save note to Supabase
async function saveNote(customerId, content){
  const c=C.find(x=>x.id===customerId);
  if(!c) return null;
  const {data,error}=await sb.from('notes').insert({
    customer_id:customerId,
    content,
    created_by:currentUser?.id||null,
    created_by_name:currentUser?.email||''
  }).select().single();
  if(error){alert('Kunde inte spara anteckning: '+error.message);return null;}
  if(!c.notes)c.notes=[];
  c.notes.unshift({id:data.id,t:data.content,d:new Date(data.created_at).toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'}),by:currentUser?.email||''});
  return data;
}

// Log a change to changelog in Supabase
async function logChange(customerId, customerName, fieldName, oldValue, newValue){
  try {
    const {data}=await sb.from('changelog').insert({
      customer_id:customerId,
      customer_name_snapshot:customerName,
      action:'field_change',
      field_name:fieldName,
      old_value:String(oldValue||''),
      new_value:String(newValue||''),
      changed_by:currentUser?.id||null,
      changed_by_name:currentUser?.email||''
    }).select().single();
    const c=C.find(x=>x.id===customerId);
    if(c){
      if(!c.changes)c.changes=[];
      c.changes.unshift({id:data?.id,field:fieldName,from:String(oldValue||''),to:String(newValue||''),d:nowS(),by:currentUser?.email||''});
    }
  } catch(e){console.warn('logChange failed (non-fatal):',e);}
}

// Upload audio file for a customer to Supabase Storage
async function uploadCustomerAudio(customerId, file){
  const c=C.find(x=>x.id===customerId);
  if(!c) return false;
  try {
    // Remove existing audio first
    if(c._audio){
      await sb.storage.from('audio-files').remove([c._audio.storage_path]);
      await sb.from('audio_files').delete().eq('id',c._audio.id);
      c._audio=null;
    }
    // Upload new file
    const ext=file.name.split('.').pop()||'mp3';
    const storagePath=`customer-audio/${customerId}/${Date.now()}.${ext}`;
    const {error:uploadErr}=await sb.storage.from('audio-files').upload(storagePath,file,{contentType:file.type,upsert:true});
    if(uploadErr) throw uploadErr;
    // Save metadata
    const {data,error:insertErr}=await sb.from('audio_files').insert({
      context:'customer',customer_id:customerId,title:file.name,
      storage_path:storagePath,file_size:file.size,mime_type:file.type,
      uploaded_by:currentUser?.id||null
    }).select().single();
    if(insertErr) throw insertErr;
    c._audio=data;
    return true;
  } catch(e){alert('Uppladdning misslyckades: '+e.message);return false;}
}

// Get signed URL for secure audio playback (1 hour validity)
async function getAudioUrl(storagePath){
  const {data,error}=await sb.storage.from('audio-files').createSignedUrl(storagePath,3600);
  if(error){console.error('getAudioUrl failed:',error);return null;}
  return data.signedUrl;
}

// Delete audio for a customer
async function deleteCustomerAudio(customerId){
  const c=C.find(x=>x.id===customerId);
  if(!c||!c._audio) return false;
  try {
    await sb.storage.from('audio-files').remove([c._audio.storage_path]);
    await sb.from('audio_files').delete().eq('id',c._audio.id);
    c._audio=null;
    return true;
  } catch(e){alert('Kunde inte radera ljud: '+e.message);return false;}
}



let SELLERS=[];  // populated by loadFromSupabase

let C=[];  // Will be loaded from Supabase


let S={tab:'kunder',search:'',ktSearch:'',openId:null,ktOpenId:null,statsYear:2026,showAll:{},emailTo:'single',smsTo:'single',eSel:new Set(),sSel:new Set(),eRS:'',sRS:''};

const PL={singel:'Singel',par:'Par',familj:'Familj'};
const AL={none:'Ingen',singel:'Tilläggstjänst Singel',par:'Tilläggstjänst Par',familj:'Tilläggstjänst Familj'};
const PC={singel:'bsi',par:'bpa',familj:'bfa'};

function pl(p){return PL[p]||p||'–';}
function al(a){return AL[a]||'–';}
function pc(p){return PC[p]||'';}

function calcBind(c){
  const start=new Date(c.bind_start||c.created_at),months=c.bind_months||12;
  const end=new Date(start);end.setMonth(end.getMonth()+months);
  const now=new Date();
  if(now>=end)return{done:true,label:'Ingen bindningstid',pct:100,months};
  const total=end-start,elapsed=now-start;
  const dl=Math.ceil((end-now)/86400000),m=Math.floor(dl/30.44),d=dl-Math.round(m*30.44);
  let lbl='';if(m>0)lbl+=m+' mån ';if(d>0)lbl+=d+' dagar';
  return{done:false,label:(lbl.trim()||'Snart klar')+' kvar',pct:Math.min(99,Math.round((elapsed/total)*100)),months};
}

function months(){return['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];}

function stats(yr){
  return months().map((month,m)=>{
    const rows=C.filter(c=>{
      if(c.legacy)return false;
      const d=new Date(c.created_at);
      return d.getFullYear()===yr&&d.getMonth()===m;
    });
    return{month,salj:rows.length,anger:rows.filter(c=>c.status==='anger').length,bortfall:rows.filter(c=>c.status==='bortfall').length};
  });
}

function daysUntilExpiry(deleted_at,months){
  if(!deleted_at)return null;
  months=months||6;
  const del=new Date(deleted_at);
  const exp=new Date(del);exp.setMonth(exp.getMonth()+months);
  const now=new Date();
  return Math.ceil((exp-now)/86400000);
}

function rArkiv(el){
  const SIX_MONTHS=6*30.44*86400000;
  const TWELVE_MONTHS=12*30.44*86400000;
  const archived=C.filter(c=>c.archived&&c.deleted_at);
  // Ånger/makulering kept 12 months, raderad kept 6 months
  archived.forEach(c=>{
    const elapsed=new Date()-new Date(c.deleted_at);
    const limit=c.delete_reason==='raderad'?SIX_MONTHS:TWELVE_MONTHS;
    c._expired=elapsed>limit;
    c._retentionMonths=c.delete_reason==='raderad'?6:12;
  });
  const active_arch=archived.filter(c=>!c._expired);
  const expired_arch=archived.filter(c=>c._expired);

  el.innerHTML=`<div class="ph"><div><div class="ph-t">Borttagna kunder</div><div class="ph-s">Data sparas i 6 månader · ${active_arch.length} aktiva · ${expired_arch.length} utgångna</div></div></div><div class="ca"><div id="ark-content"></div></div>`;

  const cont=el.querySelector('#ark-content');

  if(archived.length===0){
    cont.innerHTML='<div class="empty"><p>Inga borttagna kunder</p><small>Kunder som ångrats eller makulerats visas här</small></div>';
    return;
  }

  // Info box
  const info=document.createElement('div');
  info.style.cssText='background:var(--bg2);border:1px solid var(--br);border-left:3px solid var(--gold);border-radius:8px;padding:10px 13px;margin-bottom:1rem;font-size:12px;color:var(--mu);line-height:1.6;';
  info.innerHTML='<b style="color:var(--tx);">📦 Arkiv</b> – Ånger och makulering sparas i <b>12 månader</b> (för statistik). Manuellt raderade kunder sparas i <b>6 månader</b>. Sedan raderas all data permanent.';
  cont.appendChild(info);

  if(active_arch.length>0){
    const h=document.createElement('p');h.style.cssText='font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;';h.textContent='Aktiva i arkiv';cont.appendChild(h);
    const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;margin-bottom:1.5rem;';
    active_arch.forEach(c=>{g.appendChild(buildArkCard(c));});
    cont.appendChild(g);
  }

  if(expired_arch.length>0){
    const h=document.createElement('p');h.style.cssText='font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;';h.textContent='Utgångna (raderas permanent)';cont.appendChild(h);
    const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;opacity:.5;';
    expired_arch.forEach(c=>{g.appendChild(buildArkCard(c,true));});
    cont.appendChild(g);
  }
}

function buildArkCard(c, expired=false){
  const months=c._retentionMonths||(c.delete_reason==='raderad'?6:12);
  const dl=daysUntilExpiry(c.deleted_at,months);
  const reason=c.delete_reason||'okänd';
  const reasonBadge=reason==='anger'?'<span class="ark-badge-anger">↩ Ånger</span>':reason==='makulering'||reason==='bortfall'?'<span class="ark-badge-mak">✕ Makulering</span>':'<span class="ark-badge-del">🗑 Raderad</span>';
  const dlPill=expired?'<span class="days-left-pill dl-exp">Utgången</span>':dl<=30?`<span class="days-left-pill dl-warn">⚠ ${dl} dagar kvar</span>`:`<span class="days-left-pill dl-ok">📅 ${dl} dagar kvar</span>`;
  const isO=S.openId===('ark-'+c.id);

  const card=document.createElement('div');
  card.className='ark-card'+(isO?' op':'');
  if(expired)card.style.cursor='default';

  card.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;">
      <div style="font-size:14px;font-weight:600;">${esc(c.name)}</div>
      ${reasonBadge}
    </div>
    <div style="font-size:12px;color:var(--mu);display:flex;flex-direction:column;gap:2px;margin-bottom:8px;">
      <span>${c.ssn||'–'}</span>
      <span>${c.phone||'–'}</span>
      <span>${c.email||'–'}</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
      <span class="bdg ${pc(c.pkg)}">${pl(c.pkg)}</span>
      ${dlPill}
    </div>
    <div style="font-size:11px;color:var(--mu);margin-top:6px;">
      Borttagen: ${c.deleted_at?new Date(c.deleted_at).toLocaleDateString('sv-SE'):'-'}
      &nbsp;·&nbsp; Raderas: ${c.deleted_at?new Date(new Date(c.deleted_at).setMonth(new Date(c.deleted_at).getMonth()+months)).toLocaleDateString('sv-SE'):'-'}
    </div>
    <div id="ark-body-${c.id}" style="display:${isO?'block':'none'};margin-top:10px;border-top:1px solid var(--br);padding-top:10px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">
        <div class="ii"><label>Adress</label><span style="font-size:12px;">${c.address||'–'}</span></div>
        <div class="ii"><label>Tilläggstjänst</label><span style="font-size:12px;">${al(c.addon)}</span></div>
        <div class="ii"><label>Kund sedan</label><span style="font-size:12px;">${new Date(c.created_at).toLocaleDateString('sv-SE')}</span></div>
        <div class="ii"><label>Borttagen</label><span style="font-size:12px;">${c.deleted_at?new Date(c.deleted_at).toLocaleDateString('sv-SE'):'-'}</span></div>
      </div>
      ${(c.notes||[]).length>0?`
        <div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;">Senaste anteckning</div>
        <div class="ne"><div class="nts">🕐 ${c.notes[0].d}</div><div class="ntx">${esc(c.notes[0].t)}</div></div>
      `:''}
      ${(c.changes||[]).length>0?`
        <div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 5px;">Ändringshistorik</div>
        ${c.changes.slice(0,3).map(ch=>`<div class="ne" style="margin-bottom:5px;"><div class="nts">📦 ${ch.field}: <span style="color:var(--err);">${esc(ch.from)}</span> → <span style="color:var(--g);font-weight:600;">${esc(ch.to)}</span> · ${ch.d}</div></div>`).join('')}
      `:''}
      ${!expired?`<div style="margin-top:10px;"><button class="btn bp bxs" id="restore-${c.id}" style="background:var(--g);">↩ Återställ kund</button></div>`:''}
    </div>
  `;

  if(!expired){
    card.addEventListener('click',e=>{
      if(e.target.tagName==='BUTTON')return;
      S.openId=isO?null:('ark-'+c.id);
      rArkiv(document.getElementById('main'));
    });
    const restBtn=card.querySelector(`#restore-${c.id}`);
    if(restBtn)restBtn.addEventListener('click',async e=>{
      e.stopPropagation();
      if(confirm('Återställa '+esc(c.name)+' som aktiv kund?')){
        const updated=await updateCustomer(c.id,{status:'active',status_changed_at:null,status_reason:null});
        if(!updated) return;
        c.archived=false;c.status='aktiv';c.deleted_at=null;c.delete_reason=null;
        S.openId=null;render();
        document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
        document.querySelector('.sbi[data-tab="kunder"]').classList.add('active');
        S.tab='kunder';render();
      }
    });
  }
  return card;
}

document.querySelectorAll('.sbi[data-tab]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    S.tab=btn.dataset.tab;S.openId=null;
    document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render();
  });
});

function render(){
  const active=C.filter(c=>!c.archived);
  const favs=C.filter(c=>c.favorite&&!c.archived);
  document.getElementById('tc-k').textContent=active.length;
  document.getElementById('tc-kt').textContent=favs.length;
  const arkN=C.filter(c=>c.archived&&c.deleted_at).length;
  const arkEl=document.getElementById('tc-ark');if(arkEl)arkEl.textContent=arkN;
  const m=document.getElementById('main');m.innerHTML='';
  if(S.tab==='kunder')rKunder(m);
  else if(S.tab==='statistik')rStats(m);
  else if(S.tab==='kundtjanst')rKT(m);
  else if(S.tab==='arkiv')rArkiv(m);
  else if(S.tab==='email')rEmail(m);
  else if(S.tab==='sms')rSMS(m);
}

// KUNDER
function rKunder(el){
  const active=C.filter(c=>!c.archived);
  const hdr=document.createElement('div');hdr.className='ph';
  hdr.innerHTML=`<div><div class="ph-t">Kunder</div><div class="ph-s">${active.length} aktiva kunder</div></div><div class="ph-a"><button class="btn bs" id="import-btn">📤 Importera Excel</button><button class="btn bs" id="export-btn">📥 Exportera Excel</button><button class="btn bp" id="add-btn">+ Ny kund</button></div>`;
  el.appendChild(hdr);
  hdr.querySelector('#add-btn').addEventListener('click',showAdd);
  hdr.querySelector('#export-btn').addEventListener('click',showExportModal);
  hdr.querySelector('#import-btn').addEventListener('click',()=>{
    alert('Excel-import kommer i nästa uppdatering!\n\nFör nu kan du lägga till kunder manuellt med "+ Ny kund"-knappen.');
  });
  const ca=document.createElement('div');ca.className='ca';
  const sr=document.createElement('div');sr.className='srch';
  sr.innerHTML=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14" y2="14"/></svg><input id="ks" type="text" placeholder="Sök namn, personnummer eller e-post..." value="${S.search}">`;
  ca.appendChild(sr);
  sr.querySelector('#ks').addEventListener('input',e=>{S.search=e.target.value;refreshT();});
  const tw=document.createElement('div');tw.className='twrap';
  tw.innerHTML=`<table class="ct"><thead><tr><th>Namn</th><th>Personnummer</th><th>E-post</th><th>Telefon</th><th>Adress</th><th>Säljare</th><th>Paket</th><th>Status</th><th>Bindningstid</th><th>♥</th></tr></thead><tbody id="tb"></tbody></table>`;
  ca.appendChild(tw);el.appendChild(ca);refreshT();
}

function refreshT(){
  const tb=document.getElementById('tb');if(!tb)return;tb.innerHTML='';
  const q=(S.search||'').toLowerCase().trim();
  const items=C.filter(c=>!c.archived&&(!q||(c.name||'').toLowerCase().includes(q)||(c.ssn||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)));
  if(!items.length){tb.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--mu);">${q?'Inga kunder hittades':'Inga kunder ännu'}</td></tr>`;return;}
  items.forEach(c=>{
    const bind=calcBind(c),isOpen=S.openId===c.id;
    const tr=document.createElement('tr');tr.className='dr'+(isOpen?' ro':'');
    tr.innerHTML=`<td class="tn">${esc(c.name)}</td><td class="tmo">${c.ssn||'–'}</td><td class="tmu">${c.email||'–'}</td><td class="tmu">${c.phone||'–'}</td><td class="tmu" style="max-width:130px;overflow:hidden;text-overflow:ellipsis;padding-right:24px;">${c.address||'–'}</td><td class="tmu" style="padding-left:16px;border-left:1px solid var(--bg2);">${c.saljare||'–'}</td><td><span class="bdg ${pc(c.pkg)}">${pl(c.pkg)}</span>${c.addon&&c.addon!=='none'?' <span class="bdg bad" style="font-size:10px;">+TILL</span>':''}</td><td><span style="font-size:12px;color:var(--mu);">Aktiv</span></td><td><span class="bpill ${bind.done?'bof':'bon'}">${bind.done?'✓ Klar':'⏱ '+bind.label}</span></td><td><button class="hrt ${c.favorite?'hon':'hof'}" data-id="${c.id}">♥</button></td>`;
    tr.querySelector('.hrt').addEventListener('click',e=>{
      e.stopPropagation();
      c.favorite=!c.favorite;
      // NOTE: Iteration 1 - favorite sparas bara under sessionen
      // Iteration 2: spara till Supabase via favorite-kolumn
      render();
    });
    tr.addEventListener('click',e=>{
      if(e.target.classList.contains('hrt'))return;
      const newId=isOpen?null:c.id;
      S.openId=newId;
      // Lazy-load notes/changelog/audio from Supabase when card opens
      if(newId && !c._detailLoaded){
        loadCustomerDetail(newId).then(()=>refreshT());
      } else {
        refreshT();
      }
    });
    tb.appendChild(tr);
    if(isOpen)tb.appendChild(buildX(c));
  });
}

function buildX(c){
  const bind=calcBind(c);
  const xtr=document.createElement('tr');xtr.className='xrow';
  const xtd=document.createElement('td');xtd.setAttribute('colspan','9');
  const xi=document.createElement('div');xi.className='xi';

  // info
  xi.innerHTML=`
    <div class="bbar">
      <div style="flex-shrink:0;"><div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;">Bindningstid (${bind.months} mån)</div><div style="font-size:13px;font-weight:600;margin-top:1px;">${bind.done?'Ingen bindningstid':bind.label}</div></div>
      <div class="pbw"><div class="pb" style="width:${bind.pct}%"></div></div>
      <span style="font-size:11px;color:var(--mu);flex-shrink:0;">${bind.pct}%</span>
    </div>
    <div class="igrid">
      <div class="ii"><label>Personnummer</label><span>${c.ssn||'–'}</span></div>
      <div class="ii"><label>Telefon</label><span>${c.phone||'–'}</span></div>
      <div class="ii"><label>E-post</label><span>${c.email||'–'}</span></div>
      <div class="ii"><label>Adress</label><span>${c.address||'–'}</span></div>
      <div class="ii"><label>Säljare</label><span>${c.saljare||'–'}</span></div>
      <div class="ii"><label>Paket</label><span>${pl(c.pkg)}</span></div>
      <div class="ii"><label>Tilläggstjänst</label><span>${al(c.addon)}</span></div>
      <div class="ii"><label>Kund sedan</label><span>${new Date(c.created_at).toLocaleDateString('sv-SE')}</span></div>
    </div>
  `;

  // PAKETBYTE
  const ps=mkSec('📦 Byta paket eller tilläggstjänst',`
    <div class="pgrid">
      <div><label>Paket</label>
        <select id="pks-${c.id}">
          <option value="singel" ${c.pkg==='singel'?'selected':''}>Singel – 189 kr/mån</option>
          <option value="par" ${c.pkg==='par'?'selected':''}>Par – 229 kr/mån</option>
          <option value="familj" ${c.pkg==='familj'?'selected':''}>Familj – 279 kr/mån</option>
        </select>
      </div>
      <div><label>Tilläggstjänst</label>
        <select id="ads-${c.id}">
          <option value="none" ${c.addon==='none'?'selected':''}>Ingen</option>
          <option value="singel" ${c.addon==='singel'?'selected':''}>Tilläggstjänst Singel +49 kr</option>
          <option value="par" ${c.addon==='par'?'selected':''}>Tilläggstjänst Par +79 kr</option>
          <option value="familj" ${c.addon==='familj'?'selected':''}>Tilläggstjänst Familj +99 kr</option>
        </select>
      </div>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
      <button class="btn bp bxs" id="pks-save-${c.id}">Spara ändringar</button>
      <span id="pks-sv-${c.id}" style="font-size:11px;color:var(--g);opacity:0;transition:opacity .3s;">✓ Sparat</span>
    </div>
  `);
  ps.querySelector(`#pks-save-${c.id}`).addEventListener('click',async()=>{
    const newPkg=ps.querySelector(`#pks-${c.id}`).value;
    const newAddon=ps.querySelector(`#ads-${c.id}`).value;
    if(newPkg===c.pkg && newAddon===c.addon){
      const sv=ps.querySelector(`#pks-sv-${c.id}`);sv.textContent='Inga ändringar';sv.style.opacity='1';
      setTimeout(()=>{sv.style.opacity='0';sv.textContent='✓ Sparat';},2000);
      return;
    }
    // Save to Supabase
    const updated=await updateCustomer(c.id,{
      package_type:newPkg,
      has_addon:newAddon&&newAddon!=='none'
    });
    if(!updated) return;
    if(newPkg!==c.pkg) await logChange(c.id,c.name,'Paket',pl(c.pkg),pl(newPkg));
    if(newAddon!==c.addon) await logChange(c.id,c.name,'Tilläggstjänst',al(c.addon),al(newAddon));
    c.pkg=newPkg;c.addon=newAddon;
    const sv=ps.querySelector(`#pks-sv-${c.id}`);sv.style.opacity='1';
    setTimeout(()=>sv.style.opacity='0',2000);refreshT();
  });
  xi.appendChild(ps);

  // BINDNINGSTID
  const bs=mkSec('📅 Bindningstid',`
    <div class="brrow" style="flex-wrap:wrap;">
      <p style="font-size:12px;color:var(--mu);width:100%;margin-bottom:6px;">${bind.done?'Bindningstiden har löpt ut. Välj ny period:':'Aktiv bindningstid – justera nedan:'}</p>
      <button class="btn bs bxs" id="bplus1-${c.id}">+ 1 mån</button>
      <button class="btn bs bxs" id="bminus1-${c.id}">− 1 mån</button>
      <span style="width:8px;"></span>
      <button class="btn bs bxs" id="b12-${c.id}">+ 12 månader</button>
      <button class="btn bs bxs" id="b24-${c.id}">+ 24 månader</button>
      ${!bind.done?`<button class="btn bw bxs" id="brm-${c.id}">✕ Ta bort bindningstid</button>`:''}
      <span id="bsv-${c.id}" style="font-size:11px;color:var(--g);opacity:0;transition:opacity .3s;">✓ Uppdaterat!</span>
    </div>
  `);
  const svb=bs.querySelector(`#bsv-${c.id}`);
  
  // +1 month
  bs.querySelector(`#bplus1-${c.id}`).addEventListener('click',async(e)=>{
    e.target.disabled=true;
    try {
      const newMonths=(c.bind_months||0)+1;
      const updated=await updateCustomer(c.id,{binding_months:newMonths});
      if(!updated) return;
      await logChange(c.id,c.name,'Bindningstid',(c.bind_months||0)+' mån',newMonths+' mån (+1)');
      c.bind_months=newMonths;
      svb.style.opacity='1';setTimeout(()=>svb.style.opacity='0',2000);refreshT();
    } finally { e.target.disabled=false; }
  });
  
  // -1 month
  bs.querySelector(`#bminus1-${c.id}`).addEventListener('click',async(e)=>{
    e.target.disabled=true;
    try {
      const newMonths=Math.max(0,(c.bind_months||0)-1);
      if(newMonths===c.bind_months) return;
      const updated=await updateCustomer(c.id,{binding_months:newMonths});
      if(!updated) return;
      await logChange(c.id,c.name,'Bindningstid',(c.bind_months||0)+' mån',newMonths+' mån (−1)');
      c.bind_months=newMonths;
      svb.style.opacity='1';setTimeout(()=>svb.style.opacity='0',2000);refreshT();
    } finally { e.target.disabled=false; }
  });
  
  bs.querySelector(`#b12-${c.id}`).addEventListener('click',async()=>{
    const updated=await updateCustomer(c.id,{
      binding_months:12,
      binding_start_date:new Date().toISOString().split('T')[0]
    });
    if(!updated) return;
    await logChange(c.id,c.name,'Bindningstid',(c.bind_months||12)+' månader','12 månader (förnyad '+new Date().toLocaleDateString('sv-SE')+')');
    c.bind_start=new Date().toISOString();c.bind_months=12;
    svb.style.opacity='1';setTimeout(()=>svb.style.opacity='0',2000);refreshT();
  });
  
  bs.querySelector(`#b24-${c.id}`).addEventListener('click',async()=>{
    const updated=await updateCustomer(c.id,{
      binding_months:24,
      binding_start_date:new Date().toISOString().split('T')[0]
    });
    if(!updated) return;
    await logChange(c.id,c.name,'Bindningstid',(c.bind_months||12)+' månader','24 månader (förnyad '+new Date().toLocaleDateString('sv-SE')+')');
    c.bind_start=new Date().toISOString();c.bind_months=24;
    svb.style.opacity='1';setTimeout(()=>svb.style.opacity='0',2000);refreshT();
  });
  
  const rmBtn=bs.querySelector(`#brm-${c.id}`);
  if(rmBtn)rmBtn.addEventListener('click',async()=>{
    if(!confirm('Ta bort bindningstiden för '+c.name+'? Kunden blir utan bindning omedelbart.'))return;
    const pastDate=new Date();pastDate.setFullYear(pastDate.getFullYear()-2);
    const updated=await updateCustomer(c.id,{
      binding_months:0,
      binding_start_date:pastDate.toISOString().split('T')[0]
    });
    if(!updated) return;
    await logChange(c.id,c.name,'Bindningstid',(c.bind_months||12)+' månader','Ingen bindningstid (borttagen)');
    c.bind_start=pastDate.toISOString();c.bind_months=0;
    svb.style.opacity='1';setTimeout(()=>svb.style.opacity='0',2000);refreshT();
  });
  xi.appendChild(bs);

  // LJUDFIL PER KUND
  const audio=c._audio||null;
  const audioSec=mkSec('🎤 Samtalsljud',`
    <div id="audio-wrap-${c.id}">
      ${audio?`
        <div style="background:var(--bg2);border-radius:8px;padding:.7rem .9rem;margin-bottom:.7rem;">
          <div style="font-size:12px;font-weight:600;color:var(--gd);margin-bottom:.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(audio.title)}">${esc(audio.title)}</div>
          <div class="audio-player" id="apl-${c.id}">
            <button class="audio-play-btn" id="apb-${c.id}">
              <svg class="play-icon" width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l9 5-9 5V3z"/></svg>
              <svg class="pause-icon" width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="display:none;"><rect x="4" y="3" width="3" height="10"/><rect x="9" y="3" width="3" height="10"/></svg>
            </button>
            <button class="audio-rewind-btn" id="arw-${c.id}" title="−10s">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8a5 5 0 015-5h2"/><polyline points="10,1 12,3 10,5"/></svg>
            </button>
            <div class="audio-time-wrap">
              <span class="audio-time-current" id="act-${c.id}">0:00</span>
              <div class="audio-progress" id="apr-${c.id}"><div class="audio-progress-bar" id="apbar-${c.id}"></div></div>
              <span class="audio-time-total" id="adt-${c.id}">0:00</span>
            </div>
            <button class="audio-forward-btn" id="afw-${c.id}" title="+10s">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 8a5 5 0 00-5-5H6"/><polyline points="6,1 4,3 6,5"/></svg>
            </button>
            <audio id="aaud-${c.id}" preload="metadata" controlsList="nodownload noplaybackrate" oncontextmenu="return false;" style="display:none;"></audio>
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <label class="btn bs bxs" style="cursor:pointer;font-size:11px;">
            🔄 Byt fil
            <input type="file" id="afile-${c.id}" accept="audio/*" style="display:none;">
          </label>
          <button class="btn bxs" id="adel-${c.id}" style="font-size:11px;background:var(--errl);color:var(--err);border:1px solid var(--err);">🗑 Ta bort</button>
          <span id="ast-${c.id}" style="font-size:11px;color:var(--g);opacity:0;transition:opacity .3s;">✓ Uppdaterad!</span>
        </div>
      `:`
        <div style="font-size:12px;color:var(--mu);margin-bottom:.6rem;">Ingen ljudfil uppladdad ännu.</div>
        <label class="btn bs bxs" style="cursor:pointer;font-size:11px;">
          📤 Ladda upp samtal
          <input type="file" id="afile-${c.id}" accept="audio/*" style="display:none;">
        </label>
        <span id="ast-${c.id}" style="font-size:11px;color:var(--g);opacity:0;transition:opacity .3s;margin-left:8px;">✓ Uppladdad!</span>
      `}
    </div>
  `);

  // Wire audio upload
  const fileInput=audioSec.querySelector(`#afile-${c.id}`);
  if(fileInput){
    fileInput.addEventListener('change',async()=>{
      const file=fileInput.files[0];
      if(!file) return;
      if(file.size>50*1024*1024){alert('Filen är för stor (max 50 MB)');return;}
      const stEl=audioSec.querySelector(`#ast-${c.id}`);
      stEl.textContent='⏳ Laddar upp...';stEl.style.color='var(--mu)';stEl.style.opacity='1';
      const ok=await uploadCustomerAudio(c.id,file);
      if(ok){
        stEl.textContent='✓ Klar!';stEl.style.color='var(--g)';
        setTimeout(()=>{stEl.style.opacity='0';refreshT();},1000);
      } else {
        stEl.textContent='❌ Fel';stEl.style.color='var(--err)';
        setTimeout(()=>stEl.style.opacity='0',2000);
      }
    });
  }

  // Wire delete audio
  const delAudioBtn=audioSec.querySelector(`#adel-${c.id}`);
  if(delAudioBtn){
    delAudioBtn.addEventListener('click',async()=>{
      if(!confirm('Ta bort ljudfilen för denna kund?')) return;
      await deleteCustomerAudio(c.id);
      refreshT();
    });
  }

  // Wire audio player (if audio exists)
  if(audio){
    const playBtn=audioSec.querySelector(`#apb-${c.id}`);
    const rewindBtn=audioSec.querySelector(`#arw-${c.id}`);
    const forwardBtn=audioSec.querySelector(`#afw-${c.id}`);
    const progressEl=audioSec.querySelector(`#apr-${c.id}`);
    const barEl=audioSec.querySelector(`#apbar-${c.id}`);
    const curEl=audioSec.querySelector(`#act-${c.id}`);
    const durEl=audioSec.querySelector(`#adt-${c.id}`);
    const audioEl=audioSec.querySelector(`#aaud-${c.id}`);
    const playIcon=playBtn.querySelector('.play-icon');
    const pauseIcon=playBtn.querySelector('.pause-icon');

    function fmt(t){if(!isFinite(t))return'0:00';const m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;}

    // Load signed URL on first play
    let urlLoaded=false;
    playBtn.addEventListener('click',async()=>{
      if(!urlLoaded){
        playBtn.disabled=true;
        const url=await getAudioUrl(audio.storage_path);
        if(!url){playBtn.disabled=false;return;}
        audioEl.src=url;
        urlLoaded=true;
        playBtn.disabled=false;
      }
      if(audioEl.paused) audioEl.play(); else audioEl.pause();
    });
    rewindBtn.addEventListener('click',()=>{audioEl.currentTime=Math.max(0,audioEl.currentTime-10);});
    forwardBtn.addEventListener('click',()=>{audioEl.currentTime=Math.min(audioEl.duration||0,audioEl.currentTime+10);});
    progressEl.addEventListener('click',(e)=>{
      const rect=progressEl.getBoundingClientRect();
      if(audioEl.duration) audioEl.currentTime=((e.clientX-rect.left)/rect.width)*audioEl.duration;
    });
    audioEl.addEventListener('loadedmetadata',()=>{durEl.textContent=fmt(audioEl.duration);});
    audioEl.addEventListener('timeupdate',()=>{
      curEl.textContent=fmt(audioEl.currentTime);
      if(audioEl.duration) barEl.style.width=((audioEl.currentTime/audioEl.duration)*100)+'%';
    });
    audioEl.addEventListener('play',()=>{playIcon.style.display='none';pauseIcon.style.display='block';});
    audioEl.addEventListener('pause',()=>{playIcon.style.display='block';pauseIcon.style.display='none';});
    audioEl.addEventListener('ended',()=>{playIcon.style.display='block';pauseIcon.style.display='none';});
    audioEl.oncontextmenu=()=>false;
  }
  xi.appendChild(audioSec);

  // ANTECKNINGAR
  const notes=c.notes||[];
  const showAll=S.showAll[c.id]||false;
  const vis=showAll?notes:notes.slice(0,1);
  const ns=mkSec(`📝 Anteckningar <span style="font-size:11px;color:var(--mu);font-weight:400;">(${notes.length} totalt)</span>`,`
    <div class="nadd">
      <textarea class="nta" id="nn-${c.id}" placeholder="Ny anteckning..."></textarea>
      <button class="btn bp bxs" id="nadd-${c.id}" style="align-self:flex-end;">Lägg till</button>
    </div>
    <div class="nlist" id="nl-${c.id}">
      ${vis.length===0?'<p style="font-size:12px;color:var(--mu);">Inga anteckningar ännu.</p>':vis.map(n=>`<div class="ne"><div class="nts">🕐 ${n.d}</div><div class="ntx">${esc(n.t)}</div></div>`).join('')}
      ${notes.length>1?`<button class="ntog" id="ntog-${c.id}">${showAll?'▲ Dölj historik':'▼ Visa alla '+notes.length+' anteckningar'}</button>`:''}
    </div>
  `);
  ns.querySelector(`#nadd-${c.id}`).addEventListener('click',async()=>{
    const ta=ns.querySelector(`#nn-${c.id}`);
    const txt=ta.value.trim();
    if(!txt) return;
    const btn=ns.querySelector(`#nadd-${c.id}`);
    btn.disabled=true;btn.textContent='Sparar...';
    const saved=await saveNote(c.id, txt);
    btn.disabled=false;btn.textContent='Lägg till';
    if(!saved) return;
    ta.value='';S.showAll[c.id]=false;refreshT();
  });
  const tog=ns.querySelector(`#ntog-${c.id}`);
  if(tog)tog.addEventListener('click',()=>{S.showAll[c.id]=!showAll;refreshT();});
  xi.appendChild(ns);

  // ÄNDRINGSLOGG
  const changes=c.changes||[];
  const csec=mkSec(`📋 Ändringslogg <span style="font-size:11px;color:var(--mu);font-weight:400;">(${changes.length} händelser)</span>`,
    changes.length===0
      ? '<p style="font-size:12px;color:var(--mu);">Inga ändringar registrerade ännu.</p>'
      : `<div class="clog">${changes.map(ch=>`
          <div class="cle">
            <div class="cle-ico">${ch.field==='Paket'?'📦':ch.field==='Tilläggstjänst'?'➕':ch.field==='Status'?'🔄':'📅'}</div>
            <div class="cle-body">
              <div class="cle-what">${esc(ch.field)} ändrad</div>
              <div class="cle-meta"><span style="color:var(--err);">${esc(ch.from)}</span><span class="cle-arrow">→</span><span style="color:var(--g);font-weight:600;">${esc(ch.to)}</span></div>
              <div class="cle-meta" style="margin-top:2px;">🕐 ${ch.d}${ch.by?` · <em>${esc(ch.by)}</em>`:''}</div>
            </div>
          </div>`).join('')}</div>`
  );
  xi.appendChild(csec);

  // ÅTGÄRDER
  const as=mkSec('⚙️ Åtgärder',`
    <div class="arow">
      <button class="btn bw bxs" id="ang-${c.id}">↩ Ånger</button>
      <button class="btn bd bxs" id="mak-${c.id}">✕ Makulering</button>
      <div class="adv"></div>
      <button class="btn bd bxs" id="del-${c.id}">🗑 Radera kund</button>
      <button class="btn bxs" id="permdel-${c.id}" style="background:#7a1e1e;color:#fff;border:none;">⚠️ Radera permanent (GDPR)</button>
    </div>
    <p style="font-size:11px;color:var(--mu);margin-top:8px;"><b>Ånger</b> = ångerrätt utnyttjas, räknas i ångerstatistiken &nbsp;|&nbsp; <b>Makulering</b> = abonnemang avslutas, räknas som bortfall &nbsp;|&nbsp; <b>Radera</b> = flyttar till Borttagna kunder (6 mån) &nbsp;|&nbsp; <b>Radera permanent</b> = försvinner direkt (GDPR-begäran)</p>
  `);
  as.querySelector(`#ang-${c.id}`).addEventListener('click',()=>showConfirm('anger',c));
  as.querySelector(`#mak-${c.id}`).addEventListener('click',()=>showConfirm('makulering',c));
  as.querySelector(`#del-${c.id}`).addEventListener('click',()=>showConfirm('radera',c));
  as.querySelector(`#permdel-${c.id}`).addEventListener('click',()=>showConfirm('permanent_delete',c));
  xi.appendChild(as);

  xtd.appendChild(xi);xtr.appendChild(xtd);return xtr;
}

function mkSec(title,bodyHtml){
  const d=document.createElement('div');d.className='xsec';
  d.innerHTML=`<div class="xsh"><h4>${title}</h4></div><div class="xsb">${bodyHtml}</div>`;
  return d;
}

// CONFIRM
function showConfirm(type,c){
  const mc=document.getElementById('mc');mc.innerHTML='';
  
  // Permanent delete = special modal with name confirmation
  if(type==='permanent_delete'){
    const ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML=`<div class="mdl"><h2 style="color:var(--err);">⚠️ Radera permanent</h2>
      <p>Du är på väg att <strong>permanent radera</strong> ${esc(c.name)}. Detta kan <strong>INTE ångras</strong>. All kunddata, anteckningar, ändringslogg och ljudfiler försvinner för alltid.</p>
      <p style="margin-top:12px;font-size:13px;">Detta används endast för <strong>GDPR-begäran</strong> (kundens "rätt att bli glömd"). För vanliga avslut – använd Ångrar eller Makulering istället.</p>
      <p style="margin-top:14px;font-size:13px;">Skriv kundens namn <strong>${esc(c.name)}</strong> nedan för att bekräfta:</p>
      <input type="text" id="confirm-name" placeholder="Skriv kundens fullständiga namn" style="width:100%;padding:10px;margin-top:8px;border:2px solid var(--err);border-radius:8px;font-size:14px;font-family:inherit;">
      <div class="mdla" style="margin-top:14px;"><button class="btn bs" id="cc">Avbryt</button><button class="btn bd" id="cf" disabled style="opacity:.4;">Radera permanent</button></div></div>`;
    const inp=ov.querySelector('#confirm-name');
    const btn=ov.querySelector('#cf');
    inp.addEventListener('input',()=>{
      const match=inp.value.trim().toLowerCase()===c.name.trim().toLowerCase();
      btn.disabled=!match;
      btn.style.opacity=match?'1':'.4';
    });
    ov.querySelector('#cc').addEventListener('click',closeM);
    btn.addEventListener('click',async()=>{
      btn.disabled=true;btn.textContent='Raderar...';
      const ok=await permanentDeleteCustomer(c.id);
      if(!ok){btn.disabled=false;btn.textContent='Radera permanent';return;}
      C=C.filter(x=>x.id!==c.id);
      S.openId=null;closeM();render();
    });
    ov.addEventListener('click',e=>{if(e.target===ov)closeM();});
    mc.appendChild(ov);
    setTimeout(()=>inp.focus(),50);
    return;
  }
  
  // Regular status changes (anger, makulering, radera)
  const statusMap={anger:'angrad',makulering:'makulerad',radera:'raderad'};
  const localStatusMap={anger:'anger',makulering:'bortfall',radera:'raderad'};
  const reasonMap={anger:'anger',makulering:'makulering',radera:'radering'};
  
  const cfg={
    anger:{title:'Registrera ånger',text:`Kunden ${esc(c.name)} utnyttjar sin ångerrätt. Kundkortet arkiveras och räknas som ånger i statistiken.`,label:'Ja, registrera ånger',cls:'bw'},
    makulering:{title:'Bekräfta makulering',text:`Kunden ${esc(c.name)}s abonnemang avslutas. Kundkortet arkiveras och räknas som bortfall i statistiken.`,label:'Ja, makulera',cls:'bd'},
    radera:{title:'Flytta till Borttagna kunder',text:`${esc(c.name)} flyttas till Borttagna kunder och raderas automatiskt efter 6 månader. Du kan återställa kunden under tiden.`,label:'Ja, ta bort',cls:'bd'}
  }[type];
  
  const action=async()=>{
    const dbStatus=statusMap[type];
    const updated=await updateCustomer(c.id,{
      status:dbStatus,
      status_changed_at:new Date().toISOString(),
      status_reason:type
    });
    if(!updated) return;
    const statusLabels={anger:'Ångrar',makulering:'Makulering',radera:'Raderad (6 mån)'};
    await logChange(c.id,c.name,'Status','Aktiv',statusLabels[type]||type);
    c.status=localStatusMap[type];c.archived=true;
    c.deleted_at=new Date().toISOString();c.delete_reason=reasonMap[type];
    S.openId=null;closeM();render();
  };
  
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="mdl"><h2>${cfg.title}</h2><p>${cfg.text}</p><div class="mdla"><button class="btn bs" id="cc">Avbryt</button><button class="btn ${cfg.cls}" id="cf">${cfg.label}</button></div></div>`;
  ov.querySelector('#cc').addEventListener('click',closeM);
  ov.querySelector('#cf').addEventListener('click',action);
  ov.addEventListener('click',e=>{if(e.target===ov)closeM();});
  mc.appendChild(ov);
}

// Toggle auto-mail on/off – stored in localStorage so it persists per user
function isAutoMailEnabled(){
  return localStorage.getItem('smartid_automail') !== 'off';
}
function setAutoMailEnabled(on){
  localStorage.setItem('smartid_automail', on?'on':'off');
}

// Send welcome email via Edge Function
async function sendWelcomeEmail(customer){
  try {
    const {data:{session}}=await sb.auth.getSession();
    const token=session?.access_token;
    if(!token){console.warn('No session token for mail send');return false;}
    
    const response=await fetch(`${SUPABASE_URL}/functions/v1/send-welcome-email`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${token}`,
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY
      },
      body:JSON.stringify({
        customerId:customer.id,
        fullName:customer.full_name,
        email:customer.email,
        packageType:customer.package_type,
        hasAddon:customer.has_addon,
        bindingMonths:customer.binding_months
      })
    });
    
    const result=await response.json();
    if(!response.ok){
      console.error('Mail send failed:',result);
      return false;
    }
    console.log('Welcome mail sent:',result.resendId);
    return true;
  } catch(err){
    console.error('sendWelcomeEmail error:',err);
    return false;
  }
}

function rKT(el){

  el.querySelector('#kt-in').addEventListener('input',e=>{S.ktSearch=e.target.value;rKTg();});

function rKTg(){
  const g=document.getElementById('ktg');if(!g)return;g.innerHTML='';
  const q=(S.ktSearch||'').toLowerCase().trim();
  const items=C.filter(c=>c.favorite&&!c.archived&&(!q||(c.name||'').toLowerCase().includes(q)||(c.ssn||'').toLowerCase().includes(q)));
  if(!items.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1;"><p>${S.ktSearch?'Inga hittades':'Inga markerade ärenden'}</p><small>Tryck ♥ på ett kundkort för att markera det</small></div>`;return;}
  items.forEach(c=>{
    const isO=S.ktOpenId===c.id;
    const card=document.createElement('div');card.className='ktc'+(isO?' op':'');
    const lat=c.notes&&c.notes.length>0?c.notes[0]:null;
    card.innerHTML=`
      <div class="ktcn">${esc(c.name)} <span class="bdg ${pc(c.pkg)}" style="font-size:10px;">${pl(c.pkg)}</span></div>
      <div class="ktcm"><span>${c.ssn||'–'}</span><span>${c.phone||'–'}</span>${lat?`<span style="margin-top:3px;font-style:italic;color:var(--tx);font-size:12px;">"${esc(lat.t.substring(0,55))}${lat.t.length>55?'...':''}"</span>`:''}</div>
      <div class="ktcb">
        <div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Anteckningshistorik (${c.notes.length})</div>
        <div class="ktcnotes">${c.notes.length===0?'<p style="font-size:12px;color:var(--mu);">Inga anteckningar.</p>':c.notes.map(n=>`<div class="ne"><div class="nts">🕐 ${n.d}</div><div class="ntx">${esc(n.t)}</div></div>`).join('')}</div>
        <div style="margin-top:8px;display:flex;gap:6px;align-items:flex-end;">
          <textarea id="ktta-${c.id}" style="flex:1;padding:7px 9px;border:1px solid var(--br);border-radius:7px;font-size:12px;font-family:inherit;outline:none;resize:none;min-height:50px;background:var(--bg);" placeholder="Ny anteckning..."></textarea>
          <button class="btn bp bxs" id="ktadd-${c.id}">Lägg till</button>
        </div>
      </div>
    `;
    card.addEventListener('click',e=>{if(e.target.tagName==='BUTTON'||e.target.tagName==='TEXTAREA')return;S.ktOpenId=isO?null:c.id;rKTg();});
    if(isO){
      // Load detail if not yet loaded
      if(!c._detailLoaded) loadCustomerDetail(c.id).then(()=>rKTg());
      const ab=card.querySelector(`#ktadd-${c.id}`);
      if(ab)ab.addEventListener('click',async e=>{
        e.stopPropagation();
        const ta=card.querySelector(`#ktta-${c.id}`);
        const t=ta.value.trim();if(!t)return;
        ab.disabled=true;ab.textContent='Sparar...';
        const saved=await saveNote(c.id,t);
        ab.disabled=false;ab.textContent='Lägg till';
        if(!saved)return;
        ta.value='';rKTg();
      });
    }
    g.appendChild(card);
  });
}

    if(S.emailTo==='single'){
      const cId=el.querySelector('#ec')?.value;
      if(!cId){stEl.textContent='⚠️ Välj en kund att skicka till.';stEl.style.color='var(--err)';stEl.style.display='block';return;}
      const c=C.find(x=>x.id===cId);
      if(c)recipients.push(c);
    } else {
      S.eSel.forEach(id=>{const c=C.find(x=>x.id===id);if(c)recipients.push(c);});
      if(recipients.length===0){stEl.textContent='⚠️ Välj minst en kund.';stEl.style.color='var(--err)';stEl.style.display='block';return;}
    }
    
    btn.disabled=true;btn.textContent='⏳ Skickar...';
    stEl.textContent=`Skickar till ${recipients.length} mottagare...`;stEl.style.color='var(--mu)';stEl.style.display='block';
    
    let sent=0,failed=0;
    for(const c of recipients){
      // Personalize body: replace [namn] with first name, [paket] with package
      const firstName=(c.name||'').split(' ')[0]||c.name;
      const personalBody=body.replace(/\[namn\]/gi,firstName).replace(/\[paket\]/gi,pl(c.pkg)||'-');
      const ok=await sendCustomEmail({
        to:c.email,
        subject:subj,
        body:personalBody,
        customerId:c.id,
        recipientName:c.name
      });
      if(ok)sent++; else failed++;
    }
    
    btn.disabled=false;btn.textContent='✉️ Skicka e-post';
    if(failed===0){
      stEl.textContent=`✓ ${sent} mail skickade!`;stEl.style.color='var(--g)';
      subjEl.value='';bodyEl.value='';S.eSel.clear();
      setTimeout(()=>{stEl.style.display='none';re();},3000);
    } else {
      stEl.textContent=`⚠️ ${sent} mail skickade, ${failed} misslyckades.`;stEl.style.color='var(--warn)';
    }
  });
}

// Send a custom email via Edge Function
async function sendCustomEmail({to, subject, body, customerId, recipientName}){
  try {
    const {data:{session}}=await sb.auth.getSession();
    const token=session?.access_token;
    if(!token) return false;
    
    const response=await fetch(`${SUPABASE_URL}/functions/v1/send-welcome-email`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${token}`,
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY
      },
      body:JSON.stringify({
        customMail:true,
        to,
        subject,
        body,
        customerId,
        recipientName
      })
    });
    return response.ok;
  } catch(err){
    console.error('sendCustomEmail error:',err);
    return false;
  }
}

function exportCustomersToExcel(customers,fields,dateRange){
  dateRange=dateRange||{};
  const data=customers.map(c=>{
    const row={};
    fields.forEach(f=>{
      const k=f.k;const lbl=f.label;
      if(k==='pkg')row[lbl]=pl(c.pkg);
      else if(k==='addon')row[lbl]=al(c.addon);
      else if(k==='status')row[lbl]=c.archived?'Arkiverad ('+(c.delete_reason||c.status)+')':(c.status||'aktiv');
      else if(k==='bind_info'){const b=calcBind(c);row[lbl]=b.done?'Ingen bindningstid':b.label+' ('+b.months+' mån)';}
      else if(k==='created_at')row[lbl]=c.created_at?new Date(c.created_at).toLocaleDateString('sv-SE'):'';
      else if(k==='favorite')row[lbl]=c.favorite?'Ja':'Nej';
      else if(k==='legacy')row[lbl]=c.legacy?'Ja':'Nej';
      else if(k==='notes_count')row[lbl]=(c.notes||[]).length;
      else if(k==='last_note')row[lbl]=(c.notes&&c.notes.length>0)?c.notes[0].t:'';
      else if(k==='changes_count')row[lbl]=(c.changes||[]).length;
      else row[lbl]=c[k]||'';
    });
    return row;
  });
  const ws=XLSX.utils.json_to_sheet(data);
  // Auto column widths
  const colWidths=fields.map(f=>{
    const maxLen=Math.max(f.label.length,...data.map(r=>String(r[f.label]||'').length));
    return{wch:Math.min(maxLen+2,50)};
  });
  ws['!cols']=colWidths;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Kunder');
  let fname='SmartID_Kunder';
  if(dateRange.from||dateRange.to){
    fname+='_'+(dateRange.from||'start')+'_till_'+(dateRange.to||'idag');
  } else {
    fname+='_'+new Date().toISOString().split('T')[0];
  }
  XLSX.writeFile(wb,fname+'.xlsx');
}

function exportStatsToExcel(yr,fromM,toM){
  yr=yr||S.statsYear;
  if(fromM===undefined)fromM=0;
  if(toM===undefined)toM=11;
  const allRows=stats(yr);
  const rows=allRows.slice(fromM,toM+1);
  const tS=rows.reduce((a,r)=>a+r.salj,0);
  const tA=rows.reduce((a,r)=>a+r.anger,0);
  const tB=rows.reduce((a,r)=>a+r.bortfall,0);
  // Detail rows per month
  const monthData=rows.map(r=>({
    'Månad':r.month,
    'Sälj':r.salj,
    'Ånger':r.anger,
    'Bortfall':r.bortfall,
    'Netto':r.salj-r.anger-r.bortfall
  }));
  monthData.push({'Månad':'TOTALT','Sälj':tS,'Ånger':tA,'Bortfall':tB,'Netto':tS-tA-tB});

  const ws=XLSX.utils.json_to_sheet(monthData);
  ws['!cols']=[{wch:14},{wch:10},{wch:10},{wch:12},{wch:10}];

  // Per säljare per month
  const sellers=[...new Set(C.filter(c=>!c.legacy&&c.saljare).map(c=>c.saljare))].sort();
  const monthsInRange=months().slice(fromM,toM+1);
  const perSeller=sellers.map(s=>{
    const r={'Säljare':s};
    let totS=0,totA=0,totB=0;
    monthsInRange.forEach((m,idx)=>{
      const mi=fromM+idx;
      const inMonth=C.filter(c=>{
        if(c.legacy||c.saljare!==s)return false;
        const d=new Date(c.created_at);
        return d.getFullYear()===yr&&d.getMonth()===mi;
      });
      r[m]=inMonth.length;
      totS+=inMonth.length;
      totA+=inMonth.filter(c=>c.status==='anger').length;
      totB+=inMonth.filter(c=>c.status==='bortfall').length;
    });
    r['Totalt sälj']=totS;
    r['Ånger']=totA;
    r['Bortfall']=totB;
    r['Netto']=totS-totA-totB;
    return r;
  });
  let ws2=null;
  if(perSeller.length>0){
    ws2=XLSX.utils.json_to_sheet(perSeller);
    ws2['!cols']=[{wch:22},...monthsInRange.map(()=>({wch:6})),{wch:11},{wch:7},{wch:9},{wch:7}];
  }

  const wb=XLSX.utils.book_new();
  const rangeLabel=(fromM===0&&toM===11)?String(yr):monthsInRange[0]+'-'+monthsInRange[monthsInRange.length-1]+' '+yr;
  XLSX.utils.book_append_sheet(wb,ws,'Statistik '+rangeLabel);
  if(ws2)XLSX.utils.book_append_sheet(wb,ws2,'Per säljare');
  let fname='SmartID_Statistik_'+yr;
  if(fromM!==0||toM!==11)fname+='_'+monthsInRange[0]+'-'+monthsInRange[monthsInRange.length-1];
  XLSX.writeFile(wb,fname+'.xlsx');
}
