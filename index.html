      <div style="font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Vilken typ av import?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <label style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border:1.5px solid var(--g);border-radius:8px;background:var(--w);cursor:pointer;">
          <input type="radio" name="imp-type" value="new" checked style="margin-top:2px;width:14px;height:14px;cursor:pointer;accent-color:var(--g);">
          <div>
            <div style="font-size:13px;font-weight:600;">Nya sälj</div>
            <div style="font-size:11px;color:var(--mu);margin-top:1px;">Räknas som nysälj i statistiken</div>
          </div>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border:1px solid var(--br);border-radius:8px;background:var(--w);cursor:pointer;">
          <input type="radio" name="imp-type" value="legacy" style="margin-top:2px;width:14px;height:14px;cursor:pointer;accent-color:var(--g);">
          <div>
            <div style="font-size:13px;font-weight:600;">Befintliga kunder</div>
            <div style="font-size:11px;color:var(--mu);margin-top:1px;">Räknas inte i statistiken</div>
          </div>
        </label>
      </div>
    </div>

    <div id="fdrop" style="border:2px dashed var(--br);border-radius:10px;padding:1.4rem;text-align:center;cursor:pointer;margin-bottom:1rem;transition:border-color .18s;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--gt)" stroke-width="1.5" style="margin:0 auto;display:block;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p id="fdrop-text" style="font-size:13px;color:var(--mu);margin-top:.4rem;">Klicka för att välja .xlsx eller .csv-fil</p>
      <input type="file" id="xl-file" accept=".xlsx,.xls,.csv" style="display:none">
    </div>

    <div id="map-section" style="display:none;">
      <p style="font-size:12px;color:var(--mu);margin-bottom:8px;font-weight:600;">Matcha Excel-kolumner mot CRM-fält:</p>
      <div id="map-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;"></div>
      <div style="margin-bottom:1rem;">
        <p style="font-size:11px;color:var(--mu);margin-bottom:6px;font-weight:600;">Förhandsgranskning (3 första raderna):</p>
        <div id="prev-wrap" style="overflow-x:auto;border:1px solid var(--br);border-radius:8px;"></div>
      </div>
      <div id="imp-result" style="background:#EAF4EE;border:1px solid var(--br);border-left:3px solid var(--g);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--gd);margin-bottom:1rem;display:none;"></div>
    </div>

    <div class="mdla">
      <button class="btn bs" id="imp-cancel">Avbryt</button>
      <button class="btn bp" id="imp-do" style="display:none;">Importera</button>
    </div>
  </div>`;

  const drop=ov.querySelector('#fdrop');
  const fi=ov.querySelector('#xl-file');
  drop.addEventListener('click',()=>fi.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='var(--gt)';});
  drop.addEventListener('dragleave',()=>{drop.style.borderColor='var(--br)';});
  drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='var(--br)';if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
  fi.addEventListener('change',e=>{if(e.target.files[0])processFile(e.target.files[0]);});

  // Toggle radio styling
  ov.querySelectorAll('input[name="imp-type"]').forEach(r=>{
    r.addEventListener('change',()=>{
      ov.querySelectorAll('input[name="imp-type"]').forEach(rr=>{
        const lbl=rr.closest('label');
        if(rr.checked){lbl.style.border='1.5px solid var(--g)';}
        else{lbl.style.border='1px solid var(--br)';}
      });
    });
  });

  function processFile(file){
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{header:1});
        headers=(data[0]||[]).map(h=>String(h));
        rows=data.slice(1).filter(r=>r.some(c=>c!=null&&c!==''));

        // Auto-match columns
        const autoMap={
          name:['namn','name','förnamn','firstname','kund'],
          ssn:['personnummer','ssn','pnr','person'],
          email:['email','e-post','epost','mail'],
          phone:['telefon','phone','mobil','mobilnummer','tel'],
          address:['adress','address','gata'],
          saljare:['säljare','saljare','seller','agent'],
          pkg:['paket','package','plan'],
          addon:['tillägg','tillagg','addon','extra']
        };
        mapping={};
        CRM_FIELDS.forEach(f=>{
          const h=headers.findIndex(hh=>(autoMap[f.k]||[]).some(kw=>hh.toLowerCase().includes(kw)));
          if(h>=0)mapping[f.k]=h;
        });

        // Render mapping UI
        const grid=ov.querySelector('#map-grid');
        grid.innerHTML='';
        const opts=`<option value="">-- Välj kolumn --</option>`+headers.map((h,i)=>`<option value="${i}">${esc(h)}</option>`).join('');
        CRM_FIELDS.forEach(f=>{
          const row=document.createElement('div');
          row.innerHTML=`<label style="font-size:11px;font-weight:600;color:var(--tx);display:block;margin-bottom:3px;">${f.label}${f.req?' *':''}</label><select id="mp-${f.k}" style="width:100%;padding:6px 8px;border:1px solid var(--br);border-radius:6px;font-size:12px;color:var(--tx);background:var(--bg);outline:none;">${opts}</select>`;
          const sel=row.querySelector(`#mp-${f.k}`);
          if(mapping[f.k]!==undefined)sel.value=mapping[f.k];
          sel.addEventListener('change',e=>{
            if(e.target.value!=='')mapping[f.k]=parseInt(e.target.value);
            else delete mapping[f.k];
          });
          grid.appendChild(row);
        });

        // Preview table
        const pw=ov.querySelector('#prev-wrap');
        const sample=rows.slice(0,3);
        pw.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr>${headers.map(h=>`<th style="background:var(--gd);color:#fff;padding:5px 8px;text-align:left;white-space:nowrap;">${esc(h)}</th>`).join('')}</tr></thead><tbody>${sample.map(r=>`<tr>${headers.map((_,i)=>`<td style="padding:4px 8px;border-bottom:1px solid var(--br);white-space:nowrap;">${esc(String(r[i]??''))}</td>`).join('')}</tr>`).join('')}</tbody></table>`;

        ov.querySelector('#fdrop-text').textContent='✓ '+file.name+' · '+rows.length+' rader';
        ov.querySelector('#map-section').style.display='block';
        ov.querySelector('#imp-do').style.display='inline-flex';
      }catch(err){
        alert('Kunde inte läsa filen: '+err.message);
      }
    };
    reader.readAsBinaryString(file);
  }

  ov.querySelector('#imp-cancel').addEventListener('click',closeM);
  ov.addEventListener('click',e=>{if(e.target===ov)closeM();});

  ov.querySelector('#imp-do').addEventListener('click',()=>{
    if(mapping.name===undefined){alert('Du måste matcha kolumnen Namn (obligatoriskt).');return;}
    const isLegacy=ov.querySelector('input[name="imp-type"]:checked').value==='legacy';
    const pkgMap={singel:'singel',par:'par',familj:'familj','1':'singel','2':'par','3':'familj','189':'singel','229':'par','279':'familj'};
    const addonMap={singel:'singel',par:'par',familj:'familj','doldadress singel':'singel','doldadress par':'par','doldadress familj':'familj','tilläggstjänst singel':'singel','tilläggstjänst par':'par','tilläggstjänst familj':'familj',none:'none','':'none','ingen':'none'};
    let added=0,skipped=0;
    rows.forEach(row=>{
      const get=k=>mapping[k]!==undefined?String(row[mapping[k]]||'').trim():'';
      const name=get('name');
      if(!name){skipped++;return;}
      const pkgRaw=get('pkg').toLowerCase();
      const addonRaw=get('addon').toLowerCase();
      C.unshift({
        id:Date.now().toString()+Math.random().toString(36).slice(2,8),
        name,
        ssn:get('ssn'),
        email:get('email'),
        phone:normalizePhone(get('phone')),
        address:get('address'),
        saljare:get('saljare'),
        pkg:pkgMap[pkgRaw]||'singel',
        addon:addonMap[addonRaw]||'none',
        bind_months:12,
        bind_start:new Date().toISOString(),
        status:'aktiv',
        archived:false,
        favorite:false,
        legacy:isLegacy,
        created_at:new Date().toISOString(),
        notes:[],
        changes:[]
      });
      added++;
    });
    const res=ov.querySelector('#imp-result');
    res.style.display='block';
    res.textContent='✓ '+added+' kunder importerade som '+(isLegacy?'befintliga':'nya sälj')+'.'+(skipped>0?' '+skipped+' rader hoppades över (saknar namn).':'');
    setTimeout(()=>{closeM();render();},1800);
  });

  mc.appendChild(ov);
}

function normalizePhone(raw){
  if(!raw&&raw!==0)return'';
  let p=String(raw).replace(/[\s\-\.\(\)]/g,'');
  if(!p)return'';
  if(p.startsWith('+'))return p;
  if(p.startsWith('00'))return'+'+p.slice(2);
  if(p.startsWith('0'))return'+46'+p.slice(1);
  if(p.startsWith('46'))return'+'+p;
  return p;
}



// ── INLOGGNING (Supabase Auth) ──────────────────────────────────────
async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='';
  
  // Show loading overlay
  const main=document.getElementById('main');
  if(main) main.innerHTML='<div style="padding:3rem;text-align:center;color:var(--mu);"><div style="font-size:32px;margin-bottom:12px;">⏳</div><div>Laddar kunddata...</div></div>';
  
  // Load data from Supabase
  const ok=await loadFromSupabase();
  if(!ok){
    if(main) main.innerHTML='<div style="padding:3rem;text-align:center;color:var(--err);"><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div>Kunde inte ladda data. Ladda om sidan eller kontakta support.</div></div>';
    return;
  }
  
  // Show user email + role in sidebar
  const userEl=document.querySelector('.sbu');
  if(userEl) userEl.textContent=currentUser.email+' ('+currentUser.role+')';
  
  // Wire auto-mail toggle
  const toggleEl=document.getElementById('automail-toggle');
  if(toggleEl){
    toggleEl.checked=isAutoMailEnabled();
    toggleEl.onchange=()=>setAutoMailEnabled(toggleEl.checked);
  }
  
  // Setup realtime sync
  setupRealtime();
  
  render();
}

function showLogin(){
  document.getElementById('app-shell').style.display='none';
  document.getElementById('login-screen').style.display='';
  document.getElementById('li-pass').value='';
  document.getElementById('login-err').style.display='none';
}

async function doLogin(){
  const email=document.getElementById('li-user').value.trim();
  const password=document.getElementById('li-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.style.display='none';
  
  if(!email||!password){
    errEl.textContent='Fyll i e-post och lösenord.';
    errEl.style.display='block';
    return;
  }
  
  try {
    // Sign in with Supabase
    const {data, error}=await sb.auth.signInWithPassword({email,password});
    if(error) throw error;
    
    // Get user profile (with role)
    const {data:profile, error:pErr}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
    if(pErr) throw pErr;
    
    currentUser={id:data.user.id, email:data.user.email, role:profile.role};
    
    await showApp();
  } catch(err) {
    console.error('Login failed:',err);
    errEl.textContent='Fel e-post eller lösenord.';
    errEl.style.display='block';
  }
}

document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('li-user').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

document.getElementById('logout-btn').addEventListener('click',async()=>{
  if(realtimeChannel){
    sb.removeChannel(realtimeChannel);
    realtimeChannel=null;
  }
  await sb.auth.signOut();
  currentUser=null;
  showLogin();
});

// Auto-login if session is active
(async()=>{
  try {
    const {data:{session}}=await sb.auth.getSession();
    if(session){
      const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
      if(profile){
        currentUser={id:session.user.id, email:session.user.email, role:profile.role};
        await showApp();
      }
    }
  } catch(e){console.error('Session check failed:',e);}
})();

</script>
